<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @font-face {
      font-family: 'Ethnocentric';
      src: url('../fonts/Ethnocentric-Regular.otf') format('opentype');
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      border: 2px solid #7CFC00;
      border-radius: 18px;
      padding: 32px;
      max-width: 420px;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      color: #7CFC00;
      font-family: 'Ethnocentric', sans-serif;
      font-size: 24px;
    }

    input, button {
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
    }

    input {
      background: #111;
      color: white;
      border: 1.5px solid #444;
    }

    button {
      background: linear-gradient(135deg,#7CFC00,#39a800);
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #msg {
      font-size: 13px;
      color: #aaa;
    }
    * {
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

input {
  user-select: text;
  -webkit-user-select: text;
}
  </style>
</head>

<body>
  <div class="box">
    <h1>Reset password</h1>

    <input id="password" type="password" placeholder="New password">
    <input id="confirm" type="password" placeholder="Confirm password">

    <button id="save">Save new password</button>

    <p id="msg"></p>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://grhnhivorxtoxugwwilc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyaG5oaXZvcnh0b3h1Z3d3aWxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTIzMTEsImV4cCI6MjA5MDk4ODMxMX0.A8lzPZT0AAEoLURgE_qVseOBFBNSNFu1mdIEtHPu50w'
    );

    const msg = document.getElementById('msg');
    const saveBtn = document.getElementById('save');

    async function loadRecoverySession() {
      msg.textContent = 'Loading recovery session...';

      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const urlParams = new URLSearchParams(window.location.search);

      const access_token = hashParams.get('access_token');
      const refresh_token = hashParams.get('refresh_token');
      const code = urlParams.get('code');

      if (access_token && refresh_token) {
        const { error } = await supabaseClient.auth.setSession({
          access_token,
          refresh_token
        });

        if (error) {
          msg.textContent = error.message;
          return false;
        }

        msg.textContent = '';
        return true;
      }

      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);

        if (error) {
          msg.textContent = error.message;
          return false;
        }

        msg.textContent = '';
        return true;
      }

      msg.textContent = 'Invalid or expired recovery link.';
      return false;
    }

    let recoveryReady = false;

    loadRecoverySession().then(function (ok) {
      recoveryReady = ok;
    });

    saveBtn.addEventListener('click', async function () {
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm').value.trim();

      msg.textContent = '';

      if (!recoveryReady) {
        msg.textContent = 'Recovery session not ready. Open the latest recovery email link again.';
        return;
      }

      if (!password || !confirm) {
        msg.textContent = 'Complete both fields.';
        return;
      }

      if (password.length < 6) {
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }

      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        msg.textContent = error.message;
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save new password';
        return;
      }

      msg.textContent = 'Password updated. You can now return to the app and log in.';
      saveBtn.textContent = 'Password updated';
    });
  </script>
</body>
</html>
