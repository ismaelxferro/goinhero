<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email verified</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @font-face {
      font-family: 'Ethnocentric';
      src: url('../fonts/Ethnocentric-Regular.otf') format('opentype');
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      border: 2px solid #7CFC00;
      border-radius: 18px;
      padding: 32px;
      max-width: 420px;
      background: #1e1e1e;
    }

    h1 {
      color: #7CFC00;
      font-family: 'Ethnocentric', sans-serif;
      font-size: 28px;
      line-height: 1.2;
    }
    * {
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}
  </style>
</head>
<body>
  <div class="box">
    <h1>Email verified!</h1>
    <p>Your Goin' Hero account is ready.</p>
    <p>You can now return to the app and log in.</p>
  </div>
</body>
</html>
